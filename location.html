<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location | Forever Young Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #08111F; color: #FFF8DF; overflow-x: hidden; font-family: 'Outfit', sans-serif; }
    
    :root { 
      --blue: #0A2C74; 
      --blueBright: #2C6CFF; 
      --yellow: #FFD447; 
      --cream: #FFF8DF; 
      --dark: #08111F; 
      --muted: #B6C0D7; 
    }
    
    /* Film Grain */
    body::before {
      content: ""; 
      position: fixed; 
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.06; 
      pointer-events: none; 
      z-index: 999; 
      animation: grainMove 8s steps(2) infinite;
    }
    @keyframes grainMove { 
      0% { transform: translate(0px, 0px); } 
      25% { transform: translate(-2px, 1px); } 
      50% { transform: translate(2px, -1px); } 
      75% { transform: translate(-1px, 2px); } 
      100% { transform: translate(0px, 0px); } 
    }
    
    /* Navigation */
    nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; backdrop-filter: blur(12px); background: rgba(8, 17, 31, 0.72); border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
    .nav-inner { max-width: 1400px; margin: auto; padding: 1.1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo img { height: 58px; object-fit: contain; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: var(--cream); text-decoration: none; font-size: 0.95rem; letter-spacing: 1px; transition: all 0.3s ease; position: relative; }
    .nav-links a::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 50%; background-color: var(--yellow); transition: all 0.3s ease; transform: translateX(-50%); }
    .nav-links a:hover { color: var(--yellow); text-shadow: 0 0 10px rgba(255, 212, 71, 0.4); }
    .nav-links a:hover::after { width: 100%; }

    /* Vinyl Sidebar */
    .vinyl-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100vh;
      background-image: url('images/record-row.jpg');
      background-size: cover;
      background-position: right center;
      opacity: 0.6;
      z-index: 0;
      filter: saturate(1.2) contrast(1.2) brightness(0.6);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 75%);
      mask-image: linear-gradient(to right, transparent 0%, black 75%);
    }

    /* Location Specific Styles */
    .about-header {
      padding: 150px 2rem 2rem;
      text-align: center;
      background: linear-gradient(to bottom, rgba(10, 44, 116, 0.2), transparent);
    }
    .about-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 4rem;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
    }
    .about-header p.subtitle {
      color: var(--muted);
      font-size: 1.2rem;
      max-width: 600px;
      margin: auto;
    }

    .about-content {
      max-width: 1000px;
      margin: 0 auto 6rem;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: relative;
      z-index: 2;
    }

    .about-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    
    .map-container iframe {
      width: 100%;
      height: 500px;
      border: 0;
      border-radius: 12px;
      filter: invert(90%) hue-rotate(180deg) brightness(1.1) contrast(1.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    @media(max-width:900px) {
      .vinyl-sidebar { width: 140px; opacity: 0.3; }
      .nav-inner { flex-direction: column; gap: 1rem; }
      .nav-links {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #08111F;
        border-top: 2px solid #FFD447;
        padding: 1rem;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        z-index: 9999;
      }
      .nav-links a { font-size: 0.85rem; }
      .about-header h1 { font-size: 2.5rem; }
      .about-block { padding: 2rem; }
    }
  </style>
</head>
<body>
  <div class="vinyl-sidebar"></div>
  <nav>
    <div class="nav-inner">
      <div class="logo">
        <a href="index.html"><img src="images/fyr-logo-removebg-preview.png" alt="Forever Young Records"></a>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="buying-hours.html">Buying Hours</a>
        <a href="location.html" style="color: var(--yellow);">Location</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <header class="about-header">
    <h1>Location</h1>
    <p class="subtitle">2955 S State Hwy 161, Grand Prairie, TX 75052</p>
  </header>

  <main class="about-content">
    <div class="map-container">
      <iframe src="https://maps.google.com/maps?q=Forever%20Young%20Records,%202955%20S%20State%20Hwy%20161,%20Grand%20Prairie,%20TX%2075052&t=&z=15&ie=UTF8&iwloc=&output=embed" allowfullscreen="" loading="lazy"></iframe>
    </div>
  </main>

  <div style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(0, 0, 0, 0.18); margin-top: auto;">
    <a href="https://www.xenohead.com" target="_blank" style="display: flex; align-items: center; gap: 0.8rem; text-decoration: none; color: #BFC7DA; font-size: 0.82rem; letter-spacing: 1px; transition: 0.3s ease;">
      <img src="images/XenoHead_logo.png" alt="XenoHead" style="height: 50px; border-radius: 4px;">
      <span>WebDev: www.xenohead.com</span>
    </a>
  </div>
</body>
</html>
