<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Checking In | Forever Young Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08111F;
      color: #FFF8DF;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.06; pointer-events: none; z-index: 0;
      animation: grainMove 8s steps(2) infinite;
    }
    @keyframes grainMove {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(-2px, 1px); }
      50% { transform: translate(2px, -1px); }
      75% { transform: translate(-1px, 2px); }
      100% { transform: translate(0px, 0px); }
    }
    .container {
      width: 100%; max-width: 400px; z-index: 10;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; padding: 2.5rem 2rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .logo { max-width: 150px; margin-bottom: 2rem; }
    h1 {
      font-family: 'Oswald', sans-serif; font-size: 2rem;
      margin-bottom: 1rem; text-transform: uppercase;
      letter-spacing: 1px; color: #FFD447;
    }
    p.subtitle { color: #B6C0D7; font-size: 1.1rem; line-height: 1.5; }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container" id="status-container">
    <img src="images/fyr-logo.png" alt="Forever Young Records" class="logo">
    <div id="icon-holder"></div>
    <h1 id="status-title">Checking In...</h1>
    
    <div id="manual-entry" style="display: none; margin-top: 1.5rem;">
      <p style="margin-bottom: 1rem; color: #B6C0D7;">Please enter your phone number to check in:</p>
      <input type="tel" id="manual-phone" placeholder="(555) 555-5555" style="width: 100%; padding: 1rem; border-radius: 8px; border: none; font-size: 1.2rem; text-align: center; margin-bottom: 1rem;">
      <button id="manual-btn" style="width: 100%; padding: 1rem; background: #FFD447; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer;">Check In</button>
      <p style="margin-top: 1rem; font-size: 0.9rem;"><a href="/activate.html" style="color: #FFD447;">Need to sign up first?</a></p>
    </div>

    <p class="subtitle" id="status-message">Please wait while we securely connect your profile to the register.</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      let phone = null;
      try {
        phone = localStorage.getItem('fyr_phone');
      } catch (err) {
        console.warn("localStorage blocked");
      }
      
      if (!phone) {
        // Camera sandbox cleared the memory, ask for it manually
        document.getElementById('status-title').textContent = "Welcome Back!";
        document.getElementById('status-message').style.display = 'none';
        document.getElementById('manual-entry').style.display = 'block';
        return;
      }

      doCheckIn(phone);
    });

    document.getElementById('manual-btn').addEventListener('click', () => {
      const inputVal = document.getElementById('manual-phone').value.replace(/\D/g, '');
      if(inputVal.length < 10) {
        alert("Please enter a valid 10-digit phone number.");
        return;
      }
      try {
        localStorage.setItem('fyr_phone', inputVal);
      } catch (err) {}
      document.getElementById('manual-entry').style.display = 'none';
      document.getElementById('status-message').style.display = 'block';
      document.getElementById('status-title').textContent = "Checking In...";
      doCheckIn(inputVal);
    });

    function doCheckIn(phoneNum) {
      fetch('/api/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: phoneNum })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById('icon-holder').innerHTML = '<div class="success-icon">✅</div>';
          document.getElementById('status-title').textContent = "You're Checked In!";
          document.getElementById('status-title').style.color = "#2ecc71";
          document.getElementById('status-message').textContent = "Your profile is now securely pulled up on the cashier's screen. You're ready to get punched!";
        } else {
          throw new Error(data.error);
        }
      })
      .catch(err => {
        document.getElementById('icon-holder').innerHTML = '<div class="success-icon">⚠️</div>';
        document.getElementById('status-title').textContent = "Check-In Failed";
        document.getElementById('status-title').style.color = "#ff4757";
        document.getElementById('status-message').textContent = err.message || "Please ask the cashier for assistance.";
      });
    }
  </script>
  <div style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(0, 0, 0, 0.18); margin-top: auto;">
    <a href="https://www.xenohead.com" target="_blank" style="display: flex; align-items: center; gap: 0.8rem; text-decoration: none; color: #BFC7DA; font-size: 0.82rem; letter-spacing: 1px; transition: 0.3s ease;">
      <img src="images/XenoHead_logo.png" alt="XenoHead" style="height: 50px; border-radius: 4px;">
      <span>WebDev: www.xenohead.com</span>
    </a>
  </div>
</body>
</html>
